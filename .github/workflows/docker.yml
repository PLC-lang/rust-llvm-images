name: Docker Image CI

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Run full Windows image build'
        required: false
        type: boolean
        default: false

env:
  IMAGE_NAME: rust-llvm

jobs:
  # Push image to GitHub Packages.
  # See also https://docs.docker.com/docker-hub/builds/
  build-linux:
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
          - {
            os: "ubuntu-latest",
            version: "linux",
            arch: "x86_64"
          }
          - {
            os: "ubuntu-24.04-arm",
            version: "linux",
            arch: "arm64"
          }
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v3
      - name: Build image
        working-directory: ${{ matrix.config.version }}
        shell: bash
        env:
          # Authenticates cargo-binstall against the GitHub API inside the
          # build (consumed via the gh_token BuildKit secret in Dockerfile).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: docker buildx build . --platform ${{matrix.config.version}}/${{matrix.config.arch}} --file Dockerfile --tag $IMAGE_NAME --secret id=gh_token,env=GITHUB_TOKEN

      - name: Log in to registry
        if: ${{ github.event_name != 'pull_request' }}
        # This is where you will update the PAT to GITHUB_TOKEN
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        shell: bash
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          ARCH=${{ matrix.config.arch }}

          # Determine which per-arch tags to publish:
          #   - tag push   -> :<version>-<arch> AND :latest-<arch>  (releases own :latest)
          #   - main push  -> :edge-<arch>                          (rolling main build)
          REF=${{ github.ref }}
          TAGS=()
          if [[ "$REF" == "refs/tags/"* ]]; then
            VERSION=$(echo "$REF" | sed -e 's,.*/\(.*\),\1,' -e 's/^v//')
            TAGS+=("$VERSION-$ARCH" "latest-$ARCH")
          elif [[ "$REF" == "refs/heads/main" ]]; then
            TAGS+=("edge-$ARCH")
          else
            BRANCH=$(echo "$REF" | sed -e 's,.*/\(.*\),\1,')
            TAGS+=("$BRANCH-$ARCH")
          fi

          echo IMAGE_ID=$IMAGE_ID
          for TAG in "${TAGS[@]}"; do
            echo "Publishing $IMAGE_ID:$TAG"
            docker tag $IMAGE_NAME $IMAGE_ID:$TAG
            docker push $IMAGE_ID:$TAG
          done
  validate-windows:
    name: Validate Windows Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: windows/Dockerfile
          # DL3006: Always tag image - we use ARG for version, hadolint doesn't understand this
          # DL3020: Use COPY instead of ADD - we use ADD for URLs which is valid
          # DL3059: Multiple consecutive RUN - acceptable for clarity in Windows Dockerfiles
          # SC1001: Escape sequences - Windows uses backtick, not backslash
          ignore: DL3006,DL3020,DL3059,SC1001

  build-windows:
    name: Build Windows image
    runs-on: windows-2022
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_windows }}
    steps:
      - uses: actions/checkout@v3
      - name: Build image (with retry for hcsshim transient failures)
        working-directory: windows
        env:
          DOCKER_BUILDKIT: 0
        run: |
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          
          while (-not $success -and $retryCount -lt $maxRetries) {
            $retryCount++
            Write-Host "Build attempt $retryCount of $maxRetries"
            
            docker build . --tag ${{ env.IMAGE_NAME }}
            
            if ($LASTEXITCODE -eq 0) {
              $success = $true
              Write-Host "Build succeeded on attempt $retryCount"
            } else {
              Write-Host "Build failed on attempt $retryCount"
              if ($retryCount -lt $maxRetries) {
                Write-Host "Retrying in 30 seconds..."
                Start-Sleep -Seconds 30
              }
            }
          }
          
          if (-not $success) {
            Write-Host "Build failed after $maxRetries attempts"
            exit 1
          }
        shell: pwsh

  publish-devcontainer:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: "Publish Templates"
        uses: devcontainers/action@v1
        with:
          publish-templates: "true"
          base-path-to-templates: "./devcontainer"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  push-multiplatform:
    name: Push multi platform
    needs: build-linux
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Log in to registry
        if: ${{ github.event_name != 'pull_request' }}
        # This is where you will update the PAT to GITHUB_TOKEN
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Get images
        shell: bash
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')

          # Mirror the per-arch tag list from build-linux:
          #   - tag push   -> multi-arch :<version> AND :latest
          #   - main push  -> multi-arch :edge
          REF=${{ github.ref }}
          VERSIONS=()
          if [[ "$REF" == "refs/tags/"* ]]; then
            VERSION=$(echo "$REF" | sed -e 's,.*/\(.*\),\1,' -e 's/^v//')
            VERSIONS+=("$VERSION" "latest")
          elif [[ "$REF" == "refs/heads/main" ]]; then
            VERSIONS+=("edge")
          else
            VERSIONS+=("$(echo "$REF" | sed -e 's,.*/\(.*\),\1,')")
          fi

          for V in "${VERSIONS[@]}"; do
            docker manifest create $IMAGE_ID:$V $IMAGE_ID:$V-arm64 $IMAGE_ID:$V-x86_64
            docker manifest push $IMAGE_ID:$V
          done
